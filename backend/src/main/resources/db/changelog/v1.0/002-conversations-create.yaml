databaseChangeLog:
  - changeSet:
      id: 002-conversations-create
      author: sisv1der
      changes:
        - sql:
            dbms: postgresql
            sql: |
              CREATE TYPE conversation_type AS ENUM ('DIRECT', 'GROUP');
        - createTable:
            tableName: conversations
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: title
                  type: varchar(50)
              - column:
                  name: type
                  type: conversation_type
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp

        - addForeignKeyConstraint:
            baseTableName: conversations
            baseColumnNames: created_by
            constraintName: conversations_created_by_fkey
            referencedTableName: users
            referencedColumnNames: id

        - createTable:
            tableName: conversation_members
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conversation_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: member_id
                  type: uuid
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: conversation_members
            baseColumnNames: conversation_id
            constraintName: conversation_members_conversation_id_fkey
            referencedTableName: conversations
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: conversation_members
            baseColumnNames: member_id
            constraintName: conversation_members_member_id_fkey
            referencedTableName: users
            referencedColumnNames: id
        - addUniqueConstraint:
            tableName: conversation_members
            columnNames: conversation_id, member_id